name: CI — Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install gunicorn

      - name: Check for .env in repo
        run: |
          if git ls-files | grep -q '\.env$'; then
            echo "❌ .env file is tracked in git — data leak risk!"
            exit 1
          fi
          echo "✅ No .env tracked in git"

      - name: Run smoke tests
        run: |
          python3 -m pytest backend/tests/test_smoke.py -v

      - name: Verify Dockerfile builds
        run: |
          docker build -t eduagent-ci --no-cache -f Dockerfile .
          echo "✅ Docker image builds successfully"
