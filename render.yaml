# Render Blueprint — EduAgent Backend
# https://render.com/docs/blueprint-spec
#
# Database: NOT on Render — use Supabase (free, 500MB, no CC).
# Connect via DATABASE_URL env var from Supabase dashboard.

services:
  - type: web
    name: eduagent-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt  # closest to you
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: AGENT_TIMEOUT_SECONDS
        value: "30"
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: CORS_ORIGINS
        value: https://eduagent-zeta.vercel.app,http://localhost:3000
      - key: SQLITE_PATH
        value: /tmp/eduagent.db  # fallback only — Supabase is primary

      # ── SECRETS (set these in Render Dashboard) ──
      - key: DATABASE_URL
        sync: false  # user must set: postgresql://user:pass@host:5432/postgres
      - key: JWT_SECRET
        sync: false  # user must set: openssl rand -hex 32
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
